<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  #sidebar {

  #search-box {

  .city-item {

  .city-item:hover { background: rgba(15,45,105,0.08); color: #0F2D69; }

  .city-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .city-country { font-size: 9px; color: #929292; }

  .all-toggle {
    display: flex; gap: 6px; padding: 8px 12px 4px;
    font-size: 10px; color: #929292;
  }
  .all-toggle button {
    background: #fff; border: 1px solid #C6C6C6; color: #0F2D69;
    padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 10px;
  }
  .all-toggle button:hover { background: #E6E6E6; }

  #legend { padding: 10px 12px 8px; border-top: 1px solid #C6C6C6; font-size: 10px; color: #929292; }
  #legend .leg-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  #legend .leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  #map { flex: 1; }

  .leaflet-popup-content-wrapper {
    border-radius: 10px; padding: 0; overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4); max-width: 420px;
  }
  .leaflet-popup-content { margin: 0; width: 380px !important; }
  .leaflet-popup-close-button { z-index: 10; color: #fff !important; top: 8px !important; right: 10px !important; font-size: 18px !important; }

  .popup-header {
    padding: 14px 16px 10px; color: white;
    display: flex; flex-direction: column; gap: 4px;
  }
  .popup-title { font-size: 16px; font-weight: 700; line-height: 1.2; padding-right: 24px; }
  .popup-sub { font-size: 11px; opacity: 0.85; }
  .popup-traj {
    display: inline-block; margin-top: 6px;
    padding: 2px 8px; border-radius: 12px;
    background: rgba(255,255,255,0.2); font-size: 10px; font-weight: 600;
  }

  .popup-body { padding: 12px 16px; background: #fff; }
  .popup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px; margin-bottom: 12px; }
  .popup-item { }
  .popup-item .label { font-size: 9px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
  .popup-item .value { font-size: 12px; color: #222; font-weight: 500; margin-top: 1px; }
  .popup-item.wide { grid-column: span 2; }

  .bbox-warn {
    background: #fff3cd; border-left: 3px solid #f39c12;
    padding: 4px 8px; font-size: 10px; color: #856404; margin-bottom: 10px;
    border-radius: 0 4px 4px 0;

  .pop-source-list { font-size: 10px; color: #666; }

function fmt(v, digits=0) {
  if (v == null || v === "") return "—";
  if (typeof v === 'number') return digits > 0 ? v.toFixed(digits) : v.toLocaleString('ru-RU');
  return v;
}
function fmtYear(v) {
  if (v == null || v === "") return "—";
  return Math.round(v).toString();
}
function regimeBin(r) {
  if (!r) return "—";
  if (r.toLowerCase().includes("демократ")) return "Демократический";
  return "Авторитарный";
}
function fmtPop(v) {
  if (v == null) return "—";
  if (v >= 1e6) return (v/1e6).toFixed(2) + " млн";
  if (v >= 1e3) return Math.round(v/1e3) + " тыс.";
  return fmt(v);
}

function buildPopupHTML(p) {
  const color = p.color;
  const traj = p.traj || "—";
  const trajShort = traj.replace(" (набирающие)", "");

  const plannerRu = {
    "Public": "Государственный",
    "Private": "Частный",
    "PPP": "ГЧП",
    "Mixed": "Смешанный"
  }[p.planner] || p.planner || "—";

  const focusRu = p.focus || "—";

  let gridRows = `
    <div class="popup-item"><div class="label">Страна</div><div class="value">${p.country_ru||"—"}</div></div>
    <div class="popup-item"><div class="label">Регион</div><div class="value">${p.region_ru||"—"}</div></div>
    <div class="popup-item"><div class="label">Тип</div><div class="value">${focusRu}</div></div>
    <div class="popup-item"><div class="label">Организатор</div><div class="value">${plannerRu}</div></div>
    <div class="popup-item"><div class="label">Анонс</div><div class="value">${fmtYear(p.announce)}</div></div>
    <div class="popup-item"><div class="label">Начало стройки</div><div class="value">${fmtYear(p.start)}</div></div>
    <div class="popup-item"><div class="label">Планируемое население</div><div class="value">${fmtPop(p.planned_pop)}</div></div>
    <div class="popup-item"><div class="label">Факт. население (2025)</div><div class="value">${fmtPop(p.pop_2025)}</div></div>
    <div class="popup-item"><div class="label">Доля достижения плана</div><div class="value">${p.achv_ratio != null ? (p.achv_ratio*100).toFixed(1)+"%" : "—"}</div></div>
    <div class="popup-item"><div class="label">Режим (V-Dem, 2023)</div><div class="value">${regimeBin(p.regime_ru)}</div></div>
    <div class="popup-item"><div class="label">Свобода (Freedom House, 2023)</div><div class="value">${p.fh_ru||"—"}</div></div>
    <div class="popup-item"><div class="label">Застройка DW (${p.dw_built_first_yr||""}→${p.dw_built_last_yr||""})</div><div class="value">${fmt(p.dw_built_first,1)}% → ${fmt(p.dw_built_last,1)}%</div></div>
    <div class="popup-item"><div class="label">VIIRS (${p.viirs_first_yr||""}→${p.viirs_last_yr||""})</div><div class="value">${fmt(p.viirs_first,2)} → ${fmt(p.viirs_last,2)} нт</div></div>
    <div class="popup-item wide"><div class="label">Ближайший крупный город</div><div class="value">${p.near_city||"—"} — ${fmt(p.dist_road)} км (авто) / ${fmt(p.dist_straight)} км (прямая)</div></div>
  `;

  const bboxWarn = p.is_bbox
    ? `<div class="bbox-warn">⚠ Граница приближённая (прямоугольный контур)</div>` : "";

  // Население
  let popSection = "";
  if (p.pop_data && p.pop_data.length > 0) {
    const chartId = "chart_" + p.layer.replace(/[^a-z0-9]/gi,"_");
    const srcList = p.pop_data
      .filter(d => d.source && !d.source.includes("Your file"))
      .map(d => `<li><b>${d.year}:</b> ${fmtPop(d.pop)} — <i>${d.source}</i></li>`)
      .join("");
    popSection = `
      <div class="section-title">Динамика населения</div>
      <div class="pop-chart-wrap"><canvas id="${chartId}"></canvas></div>
      <ul class="pop-source-list">${srcList}</ul>
    `;
  } else {
    popSection = `<div class="section-title">Динамика населения</div><div class="no-pop">Данные не доступны</div>`;
  }

  const uid = p.layer.replace(/[^a-z0-9]/gi,"_");
  const mediaSection = `
    <div class="section-title">Визуализация</div>
    <div class="img-tabs">
      <button class="img-tab active" onclick="switchImgTab(this,'dw_${uid}','viirs_${uid}')">Dynamic World</button>
      <button class="img-tab"        onclick="switchImgTab(this,'viirs_${uid}','dw_${uid}')">VIIRS ночью</button>
    </div>
    <div id="dw_${uid}"   class="img-panel"><img src="dw/${p.layer}_temporal.png"  loading="lazy"></div>
    <div id="viirs_${uid}" class="img-panel" style="display:none"><img src="viirs/${p.layer}_viirs.png" loading="lazy"></div>
  `;

  return `
    <div class="popup-header" style="background:${color}">
      <div class="popup-title">${p.name_en}</div>
      <div class="popup-sub">${p.country_ru||""} · ${p.region_ru||""}</div>
      <span class="popup-traj">${trajShort}</span>
    </div>
    <div class="popup-body">
      ${bboxWarn}
      <div class="popup-grid">${gridRows}</div>
      ${popSection}
      ${mediaSection}
    </div>
  `;
}

function switchImgTab(btn, showId, hideId) {
  const panel = btn.closest('.popup-body') || document.body;
  panel.querySelectorAll('.img-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const s = document.getElementById(showId); if (s) s.style.display = '';
  const h = document.getElementById(hideId); if (h) h.style.display = 'none';
}

function renderPopupChart(p) {
  if (!p.pop_data || p.pop_data.length === 0) return;
  const chartId = "chart_" + p.layer.replace(/[^a-z0-9]/gi,"_");
  const canvas = document.getElementById(chartId);
  if (!canvas) return;

  const numericPoints = p.pop_data
    .filter(d => d.year !== "Planned" && d.pop != null && !isNaN(parseInt(d.year)))
    .sort((a,b) => parseInt(a.year)-parseInt(b.year));

  const plannedPop = p.planned_pop;
  const labels = numericPoints.map(d => d.year);
  const values = numericPoints.map(d => d.pop);

  if (activeChart) { activeChart.destroy(); activeChart = null; }
  activeChart = new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Население (факт.)',
        data: values,
        backgroundColor: p.color + 'aa',
        borderColor: p.color,
        borderWidth: 1,
        borderRadius: 3,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => fmtPop(ctx.raw)
          }
        },
        annotation: plannedPop ? {
          annotations: {
            planned: {
              type: 'line', yMin: plannedPop, yMax: plannedPop,
              borderColor: '#e74c3c', borderWidth: 1, borderDash: [4,3],
              label: { content: 'Планируемое', display: true, position: 'end', font: {size:9} }
            }
          }
        } : {}
      },
      scales: {
        x: { ticks: { font: {size:9} }, grid: {display:false} },
        y: { ticks: { font: {size:9}, callback: v => fmtPop(v) }, grid: {color:'#f0f0f0'} }
      }
    }
  });
}

// ── Создаём слои ──────────────────────────────────────────────────────────────
GEOJSON.features.forEach(feature => {
  const p = feature.properties;
  const layer = L.geoJSON(feature, {
    style: {
      color: p.color,
      weight: 1.5,
      fillColor: p.color,
      fillOpacity: 0.25,
      opacity: 0.9
    }
  });

  layer.on('click', function(e) {
    const popupHTML = buildPopupHTML(p);
    const popup = L.popup({ maxWidth: 420, className: '' })
      .setLatLng(e.latlng)
      .setContent(popupHTML)
      .openOn(map);
    setTimeout(() => renderPopupChart(p), 50);
  });

  layer.on('mouseover', function() {
    layer.setStyle({ fillOpacity: 0.55, weight: 2.5 });
  });
  layer.on('mouseout', function() {
    layer.setStyle({ fillOpacity: 0.25, weight: 1.5 });
  });

  layer.addTo(map);
  layerMap[p.layer] = { leaflet: layer, props: p, visible: true };
});

// ── Сайдбар ──────────────────────────────────────────────────────────────────
function buildSidebar() {
  const list = document.getElementById('layer-list');
  list.innerHTML = '';

  const groups = {};
  TRAJ_ORDER.forEach(t => groups[t] = []);
  Object.values(layerMap).forEach(({props}) => {
    const t = TRAJ_ORDER.find(k => props.traj && props.traj.includes(k.split(" ")[0]));
    const key = t || "Символические";
    if (!groups[key]) groups[key] = [];
    groups[key].push(props);
  });
  Object.values(groups).forEach(arr => arr.sort((a,b) => a.name_en.localeCompare(b.name_en)));

  TRAJ_ORDER.forEach(traj => {
    const cities = groups[traj] || [];
    const color = {"Состоявшиеся":"#27ae60","Активно формирующиеся":"#2980b9","Ранняя стадия (набирающие)":"#f39c12","Символические":"#e74c3c"}[traj];
    const label = TRAJ_LABEL[traj] || traj;

    const group = document.createElement('div');
    group.className = 'traj-group';
    group.dataset.traj = traj;

    const header = document.createElement('div');
    header.className = 'traj-header';
    header.innerHTML = `
      <div class="traj-dot" style="background:${color}"></div>
      <span>${label}</span>
      <input type="checkbox" class="traj-check" checked title="Переключить группу" data-traj="${traj}">
    `;
    header.querySelector('.traj-check').addEventListener('change', e => {
      const checked = e.target.checked;
      cities.forEach(p => setVisible(p.layer, checked));
      group.querySelectorAll('.city-item input').forEach(cb => cb.checked = checked);
    });
    header.addEventListener('click', e => {
      if (e.target.type !== 'checkbox') {
        const c = group.querySelector('.traj-cities');
        c.style.display = c.style.display === 'none' ? '' : 'none';
      }
    });

    const citiesDiv = document.createElement('div');
    citiesDiv.className = 'traj-cities';

    cities.forEach(p => {
      const item = document.createElement('div');
      item.className = 'city-item';
      item.dataset.layer = p.layer;
      item.dataset.search = (p.name_en + ' ' + p.country_ru).toLowerCase();
      item.innerHTML = `
        <input type="checkbox" checked data-layer="${p.layer}">
        <div>
          <div class="city-name">${p.name_en}</div>
          <div class="city-country">${p.country_ru}</div>
        </div>
      `;
      item.querySelector('input').addEventListener('change', e => setVisible(p.layer, e.target.checked));
      item.addEventListener('click', e => {
        if (e.target.type !== 'checkbox') zoomTo(p.layer);
      });
      citiesDiv.appendChild(item);
    });

    group.appendChild(header);
    group.appendChild(citiesDiv);
    list.appendChild(group);
  });
}

function setVisible(layerName, visible) {
  const entry = layerMap[layerName];
  if (!entry) return;
  if (visible && !map.hasLayer(entry.leaflet)) map.addLayer(entry.leaflet);
  if (!visible && map.hasLayer(entry.leaflet)) map.removeLayer(entry.leaflet);
  entry.visible = visible;
}

function zoomTo(layerName) {
  const entry = layerMap[layerName];
  if (!entry) return;
  if (!entry.visible) setVisible(layerName, true);
  map.fitBounds(entry.leaflet.getBounds().pad(0.4));
}

function toggleAll(show) {
  Object.keys(layerMap).forEach(k => setVisible(k, show));
  document.querySelectorAll('.city-item input, .traj-check').forEach(cb => cb.checked = show);
}

function filterCities(q) {
  q = q.toLowerCase().trim();
  document.querySelectorAll('.city-item').forEach(item => {
    const match = !q || item.dataset.search.includes(q);
    item.style.display = match ? '' : 'none';
  });
}

buildSidebar();

// ── Кластерные маркеры ────────────────────────────────────────────────────────
const clusterGroup = L.markerClusterGroup({
  maxClusterRadius: 50,
  iconCreateFunction: function(cluster) {
    const children = cluster.getAllChildMarkers();
    // Считаем доминирующую траекторию в кластере
    const counts = {};
    children.forEach(m => {
      const t = m.options.traj || "Символические";
      counts[t] = (counts[t] || 0) + 1;
    });
    const dominant = Object.entries(counts).sort((a,b) => b[1]-a[1])[0][0];
    const color = {
      "Состоявшиеся": "#27ae60",
      "Активно формирующиеся": "#2980b9",
      "Ранняя стадия (набирающие)": "#f39c12",
      "Символические": "#e74c3c"
    }[dominant] || "#888";
    const n = cluster.getChildCount();
    const size = n > 10 ? 44 : n > 5 ? 36 : 28;
    return L.divIcon({
      html: `<div style="
        width:${size}px;height:${size}px;border-radius:50%;
        background:${color}cc;border:2px solid ${color};
        display:flex;align-items:center;justify-content:center;
        font-size:${n>9?11:13}px;font-weight:700;color:#fff;
        box-shadow:0 2px 8px rgba(0,0,0,0.3);
      ">${n}</div>`,
      className: '',
      iconSize: [size, size],
      iconAnchor: [size/2, size/2]
    });
  },
  spiderfyOnMaxZoom: true,
  showCoverageOnHover: false,
  zoomToBoundsOnClick: true
});

GEOJSON.features.forEach(feature => {
  const p = feature.properties;
  // Вычисляем центроид из геометрии
  const center = L.geoJSON(feature).getBounds().getCenter();

  const color = p.color || "#888";
  const marker = L.circleMarker([center.lat, center.lng], {
    radius: 7,
    fillColor: color,
    color: "#fff",
    weight: 1.5,
    fillOpacity: 0.9,
    traj: p.traj
  });

  marker.bindTooltip(
    `<b>${p.name_en}</b><br>${p.country_ru}`,
    { className: 'city-dot-tooltip', direction: 'top', offset: [0, -6] }
  );

  marker.on('click', function(e) {
    // Зум к полигону и открываем попап
    const entry = layerMap[p.layer];
    if (entry) {
      map.fitBounds(entry.leaflet.getBounds().pad(0.4));
      setTimeout(() => {
        const popup = L.popup({ maxWidth: 420 })
          .setLatLng(center)
          .setContent(buildPopupHTML(p))
          .openOn(map);
        setTimeout(() => renderPopupChart(p), 50);
      }, 400);
    }
  });

  clusterGroup.addLayer(marker);
});

map.addLayer(clusterGroup);
</script>
</body>
